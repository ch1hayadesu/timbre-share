server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/timbre_share?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

app:
  jwt:
    secret: timbre-share-jwt-secret-key-change-in-production
    expire-hours: 24
  ai-backend:
    url: http://localhost:8001
