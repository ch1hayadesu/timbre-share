<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
<defs>
<linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4facfe" stop-opacity="1"/><stop offset="50%" stop-color="#3b8fd6" stop-opacity="1"/><stop offset="100%" stop-color="#2a6fa8" stop-opacity="1"/></linearGradient>
<radialGradient id="glow3" cx="0.5" cy="0.2" r="0.5"><stop offset="0%" stop-color="rgba(255,255,255,0.1)" stop-opacity="1"/><stop offset="100%" stop-color="rgba(255,255,255,0)" stop-opacity="1"/></radialGradient>
</defs>
<rect width="400" height="300" fill="url(#bg3)"/>
<rect width="400" height="300" fill="url(#glow3)"/>
<circle cx="380" cy="30" r="90" fill="rgba(255,255,255,0.04)"/>
<circle cx="20" cy="280" r="70" fill="rgba(255,255,255,0.04)"/>
