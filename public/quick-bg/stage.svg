<path d="M50 6 Q120 20 200 8 Q280 20 350 6" stroke="rgba(200,50,50,0.3)" stroke-width="3" fill="none"/>
<path d="M50 12 Q120 26 200 14 Q280 26 350 12" stroke="rgba(200,50,50,0.2)" stroke-width="2" fill="none"/>
<!-- theater masks (comedy/tragedy simplified) -->
<circle cx="138" cy="120" r="22" fill="rgba(255,255,255,0.12)"/>
<path d="M126 114 Q138 108 150 114" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-linecap="round"/>
<path d="M128 125 Q138 122 148 125" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-linecap="round"/>
<circle cx="262" cy="120" r="22" fill="rgba(255,255,255,0.12)"/>
<path d="M250 114 Q262 108 274 114" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-linecap="round"/>
<path d="M252 125 Q262 120 272 125" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none" stroke-linecap="round"/>
<!-- stars -->
<g fill="rgba(255,255,255,0.3)">
  <polygon points="200,30 203,40 213,40 205,46 208,56 200,50 192,56 195,46 187,40 197,40" transform="scale(0.7) translate(85,0)"/>
  <polygon points="200,30 203,40 213,40 205,46 208,56 200,50 192,56 195,46 187,40 197,40" transform="scale(0.5) translate(250,60)"/>
</g>
