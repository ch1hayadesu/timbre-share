<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
<defs>
<linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#667eea" stop-opacity="1"/><stop offset="30%" stop-color="#7c5cbf" stop-opacity="1"/><stop offset="100%" stop-color="#5a3d8a" stop-opacity="1"/></linearGradient>
<radialGradient id="glow1" cx="0.3" cy="0.3" r="0.7"><stop offset="0%" stop-color="rgba(255,255,255,0.15)" stop-opacity="1"/><stop offset="100%" stop-color="rgba(255,255,255,0)" stop-opacity="1"/></radialGradient>
</defs>
<rect width="400" height="300" fill="url(#bg1)"/>
<rect width="400" height="300" fill="url(#glow1)"/>
<!-- decorative circles -->
<circle cx="350" cy="50" r="80" fill="rgba(255,255,255,0.04)"/>
<circle cx="50" cy="280" r="60" fill="rgba(255,255,255,0.04)"/>
<circle cx="380" cy="250" r="40" fill="rgba(255,255,255,0.03)"/>
<!-- microphone stand base -->
<ellipse cx="200" cy="260" rx="45" ry="8" fill="rgba(255,255,255,0.25)"/>
<!-- stand pole -->
<rect x="196" y="160" width="8" height="100" rx="4" fill="rgba(255,255,255,0.5)"/>
<!-- stand arm -->
<path d="M200 160 Q200 140 210 130" stroke="rgba(255,255,255,0.5)" stroke-width="5" fill="none" stroke-linecap="round"/>
<!-- mic head (retro round) -->
<circle cx="215" cy="110" r="32" fill="rgba(255,255,255,0.85)"/>
<circle cx="215" cy="110" r="28" fill="#667eea"/>
<circle cx="215" cy="110" r="24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
<circle cx="215" cy="110" r="18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
<circle cx="215" cy="110" r="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
<circle cx="215" cy="110" r="6" fill="rgba(255,255,255,0.2)"/>
<!-- mic holder ring -->
<ellipse cx="215" cy="140" rx="20" ry="5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
<!-- sound waves -->
<path d="M260 85 Q278 110 260 135" stroke="rgba(255,255,255,0.25)" stroke-width="3" fill="none" stroke-linecap="round"/>
<path d="M275 75 Q298 110 275 145" stroke="rgba(255,255,255,0.18)" stroke-width="3" fill="none" stroke-linecap="round"/>
<path d="M290 65 Q318 110 290 155" stroke="rgba(255,255,255,0.12)" stroke-width="3" fill="none" stroke-linecap="round"/>
<!-- sparkles -->
<circle cx="320" cy="45" r="3" fill="rgba(255,255,255,0.6)"/>
<circle cx="80" cy="70" r="2" fill="rgba(255,255,255,0.4)"/>
<circle cx="360" cy="160" r="2.5" fill="rgba(255,255,255,0.35)"/>
</svg>